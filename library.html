<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Library Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
    padding: 2rem;
    color: #222;
  }

  h2 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: #1a1a2e;
    letter-spacing: 0.5px;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.2rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.14);
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .card-label {
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    font-weight: 500;
    color: #444;
    background: #fff;
    border-top: 1px solid #f0f0f0;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    border-radius: 8px;
    object-fit: contain;
  }

  .lightbox-caption {
    color: #ddd;
    margin-top: 1rem;
    font-size: 0.95rem;
  }

  .lightbox-close {
    position: absolute;
    top: 1.2rem;
    right: 1.5rem;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    line-height: 1;
    background: none;
    border: none;
  }
</style>
</head>
<body>

<h2>SJBIT Library — Campus Gallery</h2>

<div class="gallery">

  <div class="card" onclick="openLightbox(this)">
    <img src="images/sjbit-library-kodipalya-bangalore-libraries-okkaepfzef.avif" alt="Library Reading Hall" />
    <div class="card-label">Library</div>
  </div>

  <div class="card" onclick="openLightbox(this)">
    <img src="images/Lobby3.jpeg" alt="Library Lobby" />
    <div class="card-label">Library Lobby</div>
  </div>

  <div class="card" onclick="openLightbox(this)">
    <img src="images/STACK-1-1024x768.jpg" alt="Book Stacks" />
    <div class="card-label">Engineering Book Stacks</div>
  </div>

  <div class="card" onclick="openLightbox(this)">
    <img src="images/4-scaled.webp" alt="Library Section" />
    <div class="card-label">Library Section</div>
  </div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('active')">&times;</button>
  <img id="lightbox-img" src="" alt="" />
  <div class="lightbox-caption" id="lightbox-cap"></div>
</div>

<script>
  function openLightbox(card) {
    const img = card.querySelector('img');
    const label = card.querySelector('.card-label').textContent;
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox-img').alt = img.alt;
    document.getElementById('lightbox-cap').textContent = label;
    document.getElementById('lightbox').classList.add('active');
  }

  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) {
      document.getElementById('lightbox').classList.remove('active');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
  });
</script>

</body>
</html>
